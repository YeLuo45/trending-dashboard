name: Fetch GitHub Trending Data

on:
  schedule:
    # Run every 6 hours: 5am, 11am, 5pm, 11pm Beijing time
    - cron: '0 21,3,9,15 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [refresh-data]

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            public/data
            .github
          sparse-checkout-cone-mode: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Parse and save trending data
        run: |
          python3 << "PYEOF"
          import requests
          from bs4 import BeautifulSoup
          import json
          from datetime import datetime, timezone
          import re

          GH_TOKEN = ${{ secrets.GITHUB_TOKEN }}

          def fetch_github_trending():
              headers = {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
                  'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
              }
              for attempt in range(3):
                  try:
                      response = requests.get('https://github.com/trending', headers=headers, timeout=30)
                      if response.status_code == 200:
                          return response.text
                      print(f"Attempt {attempt+1} failed with status {response.status_code}")
                  except Exception as e:
                      print(f"Attempt {attempt+1} failed: {e}")
              return None

          def fetch_repo_stats(owner, repo):
              """Fetch real-time stars and forks from GitHub API"""
              if not GH_TOKEN:
                  return None, None
              try:
                  headers = {
                      'Authorization': f'token {GH_TOKEN}',
                      'Accept': 'application/vnd.github.v3+json',
                  }
                  resp = requests.get(f'https://api.github.com/repos/{owner}/{repo}', headers=headers, timeout=10)
                  if resp.status_code == 200:
                      data = resp.json()
                      return data.get('stargazers_count', 0), data.get('forks_count', 0)
              except Exception as e:
                  print(f"Stats fetch failed for {owner}/{repo}: {e}")
              return None, None

          def parse_trending(html, existing_data):
              if not html:
                  return [], {}
              soup = BeautifulSoup(html, 'html.parser')
              articles = soup.select('article.Box-row')
              projects = []
              stars_history = existing_data.get('stars_history', {})
              forks_history = existing_data.get('forks_history', {})

              for i, article in enumerate(articles[:20], 1):
                  repo_link = article.select_one('h2 a')
                  if not repo_link:
                      continue
                  full_name = repo_link.get('href', '').strip('/')
                  if '/' not in full_name:
                      continue
                  owner, repo = full_name.split('/', 1)

                  desc_elem = article.select_one('p')
                  description = desc_elem.get_text(strip=True) if desc_elem else ''

                  lang_elem = article.select_one('span[itemprop="programmingLanguage"]')
                  language = lang_elem.get_text(strip=True) if lang_elem else ''

                  stars_elem = article.select_one('a[href$="/stargazers"]')
                  stars_text = stars_elem.get_text(strip=True) if stars_elem else '0'
                  stars = stars_text.replace(',', '')
                  if 'k' in stars.lower():
                      stars = str(int(float(stars.lower().replace('k','')) * 1000))

                  today_stars = 0
                  today_elem = article.select_one('span.float-sm-right')
                  if today_elem:
                      today_text = today_elem.get_text(strip=True)
                      today_match = re.search(r'[\d,.]+', today_text)
                      if today_match:
                          today_val = today_match.group().replace(',', '')
                          if 'k' in today_text.lower():
                              today_stars = int(float(today_val) * 1000)
                          else:
                              today_stars = int(today_val)

                  # Try to get real-time stats from GitHub API
                  api_stars, api_forks = fetch_repo_stats(owner, repo)
                  if api_stars is not None:
                      stars = str(api_stars)

                  today_str = datetime.now(timezone.utc).strftime('%Y-%m-%d')
                  repo_key = f'{owner}/{repo}'

                  # Update stars history
                  if repo_key not in stars_history:
                      stars_history[repo_key] = {}
                  if api_stars is not None:
                      stars_history[repo_key][today_str] = api_stars

                  # Update forks history
                  if repo_key not in forks_history:
                      forks_history[repo_key] = {}
                  if api_forks is not None:
                      forks_history[repo_key][today_str] = api_forks

                  projects.append({
                      'rank': i,
                      'name': repo_key,
                      'link': f'https://github.com/{owner}/{repo}',
                      'description': description[:100] if description else '',
                      'keywords': [language] if language else [],
                      'totalStars': stars,
                      'growth': str(today_stars),
                      'growthValue': today_stars
                  })
              return projects, {'stars_history': stars_history, 'forks_history': forks_history}

          html = fetch_github_trending()
          existing_data = {}
          try:
              with open('public/data/trending.json', 'r') as f:
                  existing_data = json.load(f)
          except:
              pass

          projects, history = parse_trending(html, existing_data)
          if not projects:
              print("WARNING: No projects parsed")
              exit(1)

          # Merge weekly: keep all unique projects across history
          existing_weekly = existing_data.get('weekly', [])
          existing_monthly = existing_data.get('monthly', [])

          weekly_map = {}
          for p in existing_weekly:
              weekly_map[p['name']] = p
          for p in projects:
              weekly_map[p['name']] = p

          monthly_map = {}
          for p in existing_monthly:
              monthly_map[p['name']] = p
          for p in projects:
              monthly_map[p['name']] = p

          trending_data = {
              'daily': projects,
              'weekly': list(weekly_map.values())[:20],
              'monthly': list(monthly_map.values())[:20],
              'stars_history': history.get('stars_history', {}),
              'forks_history': history.get('forks_history', {}),
              'lastUpdated': datetime.now().strftime('%Y-%m-%d %H:%M'),
              'generatedAt': datetime.now(timezone.utc).isoformat()
          }

          with open('public/data/trending.json', 'w') as f:
              json.dump(trending_data, f, ensure_ascii=False, indent=2)

          print(f"Saved daily={len(trending_data['daily'])}, weekly={len(trending_data['weekly'])}, monthly={len(trending_data['monthly'])}")
          print(f"Top: {projects[0]['name']} ({projects[0]['totalStars']} stars, +{projects[0]['growth']} today)")

          EOF

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add public/data/trending.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: auto-update trending data $(date +'%Y-%m-%d %H:%M')"
          if ! git push; then
            echo "ERROR: Git push failed. Trending data update was NOT published."
            echo "Please check:"
            echo "1. GitHub token permissions (Contents: write)"
            echo "2. Branch protection rules"
            echo "3. Network connectivity"
            exit 1
          fi
          echo "Successfully pushed trending data update"

      - name: Failure notification
        if: failure()
        run: |
          echo "Workflow failed. Creating issue notification..."
          BODY="## GitHub Trending Data Fetch Failed

          Date: $(date -u +'%Y-%m-%d %H:%M UTC')

          The automated trending data fetch workflow has failed. Please check the workflow run logs.

          [View Workflow Runs](https://github.com/${{ github.repository }}/actions/workflows/fetch-trending.yml)

          ---
          *Auto-generated notification*"

          # Only create issue if not already an issue from recent failure
          gh issue create \
            --title "[Auto] Trending data fetch failed - $(date +'%Y-%m-%d')" \
            --body "$BODY" \
            --repo ${{ github.repository }} \
            2>/dev/null || echo "Issue creation skipped (may already exist)"
