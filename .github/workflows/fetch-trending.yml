name: Fetch GitHub Trending Data

on:
  schedule:
    - cron: '0 21,3,9,15 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [refresh-data]

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            public/data
            .github
          sparse-checkout-cone-mode: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Parse and save trending data
        run: |
          python3 << 'PYEOF'
import requests
import json
import os
from datetime import datetime, timezone, timedelta

GH_TOKEN = os.environ.get('GITHUB_TOKEN', '')
HISTORY_DIR = 'public/data/history'
MAX_HISTORY_DAYS = 30

def fetch_trending_graphql():
    query = '{ search(query: "created:>2026-05-01", type: REPOSITORY, first: 100) { nodes { ... on Repository { nameWithOwner description primaryLanguage { name } stargazerCount forkCount url createdAt } } } }'
    url = 'https://api.github.com/graphql'
    headers = {'Authorization': 'Bearer ' + GH_TOKEN, 'Content-Type': 'application/json'}
    for attempt in range(3):
        try:
            resp = requests.post(url, json={'query': query}, headers=headers, timeout=30)
            if resp.status_code == 200:
                data = resp.json()
                return data.get('data', {}).get('search', {}).get('nodes', [])
        except Exception as e:
            print('Attempt ' + str(attempt+1) + ' failed: ' + str(e))
    return []

def fetch_realtime_stats(owner, repo):
    if not GH_TOKEN:
        return None, None
    try:
        resp = requests.get('https://api.github.com/repos/' + owner + '/' + repo, headers={'Authorization': 'Bearer ' + GH_TOKEN, 'Accept': 'application/vnd.github.v3+json'}, timeout=10)
        if resp.status_code == 200:
            d = resp.json()
            return d.get('stargazers_count', 0), d.get('forks_count', 0)
    except:
        pass
    return None, None

existing_data = {}
try:
    with open('public/data/trending.json', 'r') as f:
        existing_data = json.load(f)
except:
    pass

nodes = fetch_trending_graphql()
if not nodes:
    print('WARNING: No data from GraphQL')
    exit(1)

stars_history = existing_data.get('stars_history', {})
forks_history = existing_data.get('forks_history', {})
today_str = datetime.now(timezone.utc).strftime('%Y-%m-%d')

daily_projects = []
for i, node in enumerate(nodes[:20], 1):
    full_name = node.get('nameWithOwner', '')
    if not full_name or '/' not in full_name:
        continue
    owner, repo = full_name.split('/', 1)
    description = node.get('description') or ''
    language = ''
    if node.get('primaryLanguage'):
        language = node['primaryLanguage'].get('name', '')
    total_stars = node.get('stargazerCount', 0)
    total_forks = node.get('forkCount', 0)

    api_stars, api_forks = fetch_realtime_stats(owner, repo)
    if api_stars is not None:
        total_stars = api_stars
    if api_forks is not None:
        total_forks = api_forks

    repo_key = owner + '/' + repo
    if repo_key not in stars_history:
        stars_history[repo_key] = {}
    if api_stars is not None:
        stars_history[repo_key][today_str] = api_stars

    if repo_key not in forks_history:
        forks_history[repo_key] = {}
    if api_forks is not None:
        forks_history[repo_key][today_str] = api_forks

    daily_projects.append({'rank': i, 'name': repo_key, 'link': 'https://github.com/' + owner + '/' + repo, 'description': description[:100], 'keywords': [language] if language else [], 'totalStars': str(total_stars), 'growth': '0', 'growthValue': 0})

if not daily_projects:
    print('WARNING: No projects built')
    exit(1)

existing_weekly = existing_data.get('weekly', [])
existing_monthly = existing_data.get('monthly', [])

seen_w = {}
for p in existing_weekly:
    seen_w[p['name']] = p
for p in daily_projects:
    seen_w[p['name']] = p
weekly = list(seen_w.values())[:20]

seen_m = {}
for p in existing_monthly:
    seen_m[p['name']] = p
for p in daily_projects:
    seen_m[p['name']] = p
monthly = list(seen_m.values())[:20]

trending_data = {'daily': daily_projects, 'weekly': weekly, 'monthly': monthly, 'stars_history': stars_history, 'forks_history': forks_history, 'lastUpdated': datetime.now().strftime('%Y-%m-%d %H:%M'), 'generatedAt': datetime.now(timezone.utc).isoformat()}

os.makedirs(HISTORY_DIR, exist_ok=True)
history_file = os.path.join(HISTORY_DIR, today_str + '.json')
with open(history_file, 'w') as f:
    json.dump({'daily': daily_projects, 'generatedAt': datetime.now(timezone.utc).isoformat()}, f, ensure_ascii=False, indent=2)

existing_files = sorted([f for f in os.listdir(HISTORY_DIR) if f.endswith('.json')])
cutoff = (datetime.now(timezone.utc) - timedelta(days=MAX_HISTORY_DAYS)).strftime('%Y-%m-%d')
for f in existing_files:
    if f < cutoff:
        os.remove(os.path.join(HISTORY_DIR, f))

with open('public/data/trending.json', 'w') as f:
    json.dump(trending_data, f, ensure_ascii=False, indent=2)

print('Saved daily=' + str(len(daily_projects)) + ', weekly=' + str(len(weekly)) + ', monthly=' + str(len(monthly)))
print('History snapshot: ' + history_file)
print('Top: ' + daily_projects[0]['name'] + ' (' + daily_projects[0]['totalStars'] + ' stars)')

PYEOF

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add public/data/trending.json public/data/history/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: auto-update trending data $(date +'%Y-%m-%d %H:%M')"
          if ! git push; then
            echo "ERROR: Git push failed"
            exit 1
          fi
          echo "Successfully pushed trending data update"

      - name: Failure notification
        if: failure()
        run: |
          gh issue create \
            --title "[Auto] Trending data fetch failed - $(date +'%Y-%m-%d')" \
            --body "Workflow failed on $(date -u +'%Y-%m-%d %H:%M UTC'). Check logs: https://github.com/${{ github.repository }}/actions/workflows/fetch-trending.yml" \
            --repo ${{ github.repository }} \
            2>/dev/null || echo "Issue creation skipped"
